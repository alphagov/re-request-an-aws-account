version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
    time: "03:00"
  open-pull-requests-limit: 10
  ignore:
  - dependency-name: listen
    versions:
    - 3.5.0
  - dependency-name: webmock
    versions:
    - 3.11.2
    - 3.11.3
    - 3.12.0
    - 3.12.1
  - dependency-name: rails
    update-types: major

- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "daily"
    time: "03:00"
  open-pull-requests-limit: 10
